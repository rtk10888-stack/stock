<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTK Store Control — ระบบควบคุมสต๊อคสินค้า</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1729; --bg2:#16213e; --panel:#ffffff; --panel2:#f7f9fc;
  --line:#e6eaf2; --line2:#eef2f8;
  --ink:#1a2440; --ink2:#5a6885; --ink3:#90a0bd;
  --brand:#3b5bdb; --brand2:#5c7cfa; --brandL:#eef2ff;
  --teal:#0ca678; --tealL:#e6fcf5;
  --amber:#f59f00; --amberL:#fff9db;
  --red:#e03131; --redL:#fff0f0;
  --violet:#7048e8; --violetL:#f3f0ff;
  --cyan:#1098ad; --cyanL:#e3fafc;
  --shadow:0 1px 3px rgba(20,30,60,.06),0 8px 24px rgba(20,30,60,.06);
  --shadow2:0 12px 40px rgba(20,30,60,.16);
  --r:14px; --r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans Thai','Inter',system-ui,sans-serif;background:var(--panel2);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cfd8ea;border-radius:8px;border:2px solid var(--panel2)}
::-webkit-scrollbar-thumb:hover{background:#aebbd6}
.app{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:248px;background:linear-gradient(180deg,#101a33,#0d1530);color:#c9d4ee;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:30}
.brand{padding:20px 18px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.07)}
.brand .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#5c7cfa,#3b5bdb);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;color:#fff;box-shadow:0 4px 14px rgba(60,90,220,.45)}
.brand .t1{font-weight:700;color:#fff;font-size:15px;letter-spacing:.2px}
.brand .t2{font-size:11px;color:#8294bd}
.nav{flex:1;overflow-y:auto;padding:10px 10px 20px}
.nav-group{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:#5e6f96;margin:16px 12px 6px;font-weight:600}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;color:#b7c4e2;text-decoration:none;font-size:13.5px;cursor:pointer;margin-bottom:2px;transition:.12s;position:relative}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.active{background:linear-gradient(135deg,rgba(92,124,250,.22),rgba(59,91,219,.14));color:#fff;font-weight:600}
.nav a.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:#5c7cfa}
.nav a .ico{width:18px;text-align:center;font-size:15px;opacity:.95}.nav a .ab{display:none}
.nav a .badge{margin-left:auto;background:#e03131;color:#fff;font-size:10.5px;font-weight:700;border-radius:20px;padding:1px 7px;min-width:18px;text-align:center}
.nav a .badge.amber{background:#f59f00}

/* Main */
.main{margin-left:248px;flex:1;min-width:0}
.topbar{height:60px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 26px;position:sticky;top:0;z-index:20}
.topbar h1{font-size:17px;font-weight:600;color:var(--ink)}
.topbar .crumb{color:var(--ink3);font-size:12.5px}
.topbar .right{margin-left:auto;display:flex;align-items:center;gap:10px}
.content{padding:24px 26px 60px;max-width:1400px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 14px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:.12s;white-space:nowrap}
.btn:hover{border-color:#c4cee0;background:#fafbff}
.btn.pri{background:linear-gradient(135deg,#5c7cfa,#3b5bdb);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(60,90,220,.28)}
.btn.pri:hover{filter:brightness(1.06)}
.btn.ok{background:var(--teal);border-color:transparent;color:#fff}
.btn.ok:hover{filter:brightness(1.06)}
.btn.danger{background:#fff;border-color:#f1c4c4;color:var(--red)}
.btn.danger:hover{background:var(--redL)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--ink2)}
.btn.ghost:hover{background:var(--line2)}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.card .lbl{font-size:12.5px;color:var(--ink2);display:flex;align-items:center;gap:7px;margin-bottom:8px}
.card .lbl .dot{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px}
.card .val{font-size:26px;font-weight:700;font-family:'Inter',sans-serif;letter-spacing:-.5px}
.card .sub{font-size:11.5px;color:var(--ink3);margin-top:3px}
.d-brand{background:var(--brandL);color:var(--brand)} .d-teal{background:var(--tealL);color:var(--teal)}
.d-amber{background:var(--amberL);color:var(--amber)} .d-red{background:var(--redL);color:var(--red)}
.d-violet{background:var(--violetL);color:var(--violet)} .d-cyan{background:var(--cyanL);color:var(--cyan)}

/* Panel */
.panel{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:22px;overflow:hidden}
.panel-h{padding:15px 18px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.panel-h h2{font-size:15px;font-weight:600}
.panel-h .desc{font-size:12px;color:var(--ink3)}
.panel-h .right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.panel-b{padding:18px}
.panel-b.nopad{padding:0}

/* Inputs */
.field{margin-bottom:13px}
.field label{display:block;font-size:12.5px;color:var(--ink2);margin-bottom:5px;font-weight:500}
.field label .req{color:var(--red)}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:13.5px;color:var(--ink);background:#fff;transition:.12s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand2);box-shadow:0 0 0 3px rgba(92,124,250,.14)}
input::placeholder{color:#aab6cf}
.row{display:grid;gap:12px}
.row.c2{grid-template-columns:1fr 1fr} .row.c3{grid-template-columns:1fr 1fr 1fr} .row.c4{grid-template-columns:repeat(4,1fr)}
.searchbox{position:relative;flex:1;min-width:180px;max-width:340px}
.searchbox input{padding-left:34px}
.searchbox::before{content:"🔍";position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.6}

/* Table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;background:var(--panel2);color:var(--ink2);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--line);position:sticky;top:0;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--line2);vertical-align:middle}
tbody tr:hover{background:#f9fbff}
tbody tr:last-child td{border-bottom:none}
td.num,th.num{text-align:right;font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums}
.pn{font-family:'Inter',monospace;font-weight:600;font-size:12.5px;color:var(--ink)}
.muted{color:var(--ink3)}
.linkish{color:var(--brand);cursor:pointer;font-weight:500}
.linkish:hover{text-decoration:underline}

/* Pills / tags */
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.tag.fg{background:var(--brandL);color:var(--brand)}
.tag.rm{background:var(--cyanL);color:var(--cyan)}
.tag.green{background:var(--tealL);color:var(--teal)}
.tag.amber{background:var(--amberL);color:#b07700}
.tag.red{background:var(--redL);color:var(--red)}
.tag.gray{background:#eef1f6;color:var(--ink2)}
.tag.violet{background:var(--violetL);color:var(--violet)}
.tag.cyan{background:var(--cyanL);color:var(--cyan)}
.dotline{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(15,23,41,.5);backdrop-filter:blur(3px);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal{background:#fff;border-radius:16px;width:100%;max-width:620px;box-shadow:var(--shadow2);animation:pop .16s ease}
.modal.lg{max-width:860px}
@keyframes pop{from{transform:translateY(8px) scale(.99);opacity:0}to{transform:none;opacity:1}}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:12px}
.modal-h h3{font-size:16px;font-weight:600;flex:1}
.modal-h .x{cursor:pointer;color:var(--ink3);font-size:22px;line-height:1;padding:2px 6px;border-radius:8px}
.modal-h .x:hover{background:var(--line2);color:var(--ink)}
.modal-b{padding:20px 22px;max-height:64vh;overflow-y:auto}
.modal-f{padding:14px 22px;border-top:1px solid var(--line2);display:flex;gap:10px;justify-content:flex-end;background:var(--panel2);border-radius:0 0 16px 16px}

/* line items */
.lineitem{display:grid;grid-template-columns:1fr 110px 110px 34px;gap:8px;align-items:end;margin-bottom:8px}
.lineitem .rm-x{height:38px;border:1px solid var(--line);background:#fff;border-radius:8px;color:var(--red);cursor:pointer;display:flex;align-items:center;justify-content:center}
.lineitem .rm-x:hover{background:var(--redL)}

/* empty */
.empty{text-align:center;padding:48px 20px;color:var(--ink3)}
.empty .big{font-size:42px;margin-bottom:10px;opacity:.7}
.empty .t{font-weight:600;color:var(--ink2);margin-bottom:4px}

/* toast */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:80;display:flex;flex-direction:column;gap:10px}
.toast{background:#13203c;color:#fff;padding:12px 18px;border-radius:11px;font-size:13.5px;box-shadow:var(--shadow2);display:flex;align-items:center;gap:9px;animation:slidein .2s ease;max-width:340px}
.toast.ok{background:#0b7a55}.toast.err{background:#c92a2a}
@keyframes slidein{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}

/* misc */
.flow{display:flex;gap:0;align-items:stretch;overflow-x:auto;padding:4px 0}
.flow .step{flex:1;min-width:120px;background:#fff;border:1px solid var(--line);padding:12px 14px;position:relative}
.flow .step:first-child{border-radius:10px 0 0 10px}
.flow .step:last-child{border-radius:0 10px 10px 0}
.flow .step .n{font-size:11px;color:var(--ink3);font-weight:600}
.flow .step .nm{font-size:12.5px;font-weight:600;margin-top:2px}
.flow .step .v{font-size:18px;font-weight:700;font-family:'Inter';margin-top:4px}
.flow .step .arrow{position:absolute;right:-9px;top:50%;transform:translateY(-50%);z-index:2;color:var(--ink3);font-size:15px}
.seg{display:inline-flex;background:var(--line2);border-radius:9px;padding:3px}
.seg button{border:none;background:transparent;padding:6px 13px;border-radius:7px;font-size:12.5px;font-family:inherit;cursor:pointer;color:var(--ink2);font-weight:500}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);font-weight:600}
.hint{background:var(--brandL);border:1px solid #d7e0ff;border-radius:10px;padding:11px 14px;font-size:12.5px;color:#33489c;display:flex;gap:9px;margin-bottom:14px}
.hint .i{font-size:15px}
.kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line);font-size:13px}
.kv:last-child{border:none} .kv .k{color:var(--ink2)}
.bktbar{display:flex;height:8px;border-radius:6px;overflow:hidden;background:var(--line2);margin-top:6px}
.timeline{position:relative;padding-left:22px}
.timeline .ev{position:relative;padding:0 0 16px}
.timeline .ev::before{content:"";position:absolute;left:-15px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--brand);border:2px solid #fff;box-shadow:0 0 0 2px var(--brandL)}
.timeline::after{content:"";position:absolute;left:-11px;top:6px;bottom:6px;width:2px;background:var(--line)}
@media(max-width:880px){.sidebar{width:70px}.brand .t1,.brand .t2,.nav-group{display:none}.nav a .lbl{display:none}.nav a{flex-direction:column;justify-content:center;gap:2px;padding:7px 2px;text-align:center}.nav a .ab{display:block;font-size:9px;font-weight:700;letter-spacing:.2px;line-height:1.1}.nav a .ico{font-size:18px;width:auto}.nav a .badge{position:absolute;top:3px;right:6px}.main{margin-left:70px}.nav a.active::before{top:5px;bottom:auto;height:auto;width:auto;left:6px;right:6px;bottom:auto}.row.c2,.row.c3,.row.c4{grid-template-columns:1fr}}
</style>
</head>

async function pushCloud(force){
  if(!supa)return;

  if(!force && json===lastSyncedJSON)return;
  const now=new Date().toISOString();
  setSyncStatus('saving');

    const {error}=await supa.from('app_state').upsert({id:ROW_ID,data:DB,client_id:CLIENT_ID,updated_at:now});
    if(error)throw error;
    lastSyncedJSON=json; lastRemoteUpdated=new Date(now).getTime(); cloudOK=true; setSyncStatus('synced');
  }catch(e){ cloudOK=false; setSyncStatus('offline'); }
}
async function reloadFromCloud(){
  if(!supa)return;
  try{
    const {data}=await supa.from('app_state').select('data,updated_at').eq('id',ROW_ID).maybeSingle();
    if(data&&data.data){ applyingRemote=true; DB=data.data; lastRemoteUpdated=new Date(data.updated_at).getTime(); lastSyncedJSON=JSON.stringify(DB); localStorage.setItem(LS_KEY,lastSyncedJSON); render(); applyingRemote=false; setSyncStatus('synced'); }
  }catch(e){}

function subscribeRealtime(){
  if(!supa)return;
  try{
    supa.channel('app_state_rt').on('postgres_changes',{event:'*',schema:'public',table:'app_state',filter:'id=eq.'+ROW_ID},payload=>{
      const row=payload.new;
      if(row&&row.client_id===CLIENT_ID)return;
      const t=row&&row.updated_at?new Date(row.updated_at).getTime():0;
      if(t&&t<=lastRemoteUpdated)return;
      if(row&&row.data){ applyingRemote=true; DB=row.data; lastRemoteUpdated=t; lastSyncedJSON=JSON.stringify(DB); localStorage.setItem(LS_KEY,lastSyncedJSON); render(); applyingRemote=false; toast('🔄 ข้อมูลอัปเดตจากอุปกรณ์อื่น','ok'); }
      else reloadFromCloud();
    }).subscribe();
  }catch(e){}
  setInterval(async()=>{
    if(!supa||applyingRemote)return;
    try{ const {data}=await supa.from('app_state').select('updated_at,client_id').eq('id',ROW_ID).maybeSingle();
      if(data){ const t=new Date(data.updated_at).getTime(); if(t>lastRemoteUpdated&&data.client_id!==CLIENT_ID)reloadFromCloud(); cloudOK=true; setSyncStatus('synced'); }
    }catch(e){ cloudOK=false; setSyncStatus('offline'); }
  },15000);
}

/* movement helper */
function move(productId,bucket,qty,docType,docNo,note){
  DB.movements.push({id:uid(),date:todayISO(),ts:Date.now(),productId,bucket,qty,docType,docNo,note:note||''});
}
/* Apply stock effect for a doc (called on approve). Returns {ok,err} */
function applyDoc(d){
  const t=d.type;
  try{
    if(t==='GR'){ d.lines.forEach(l=>{const p=P(l.productId);p.onHand+=l.qty;move(p.id,'onHand',+l.qty,'GR',d.no,'รับซื้อ '+(d.supplier||''));}); }
    else if(t==='WD'){ d.lines.forEach(l=>{const p=P(l.productId);if(p){p.onHand-=l.qty;move(p.id,'onHand',-l.qty,'WD',d.no,'เบิกผลิต '+(l.poNo||d.refPRD||''));}}); }
    else if(t==='DP'){ const p=P(d.productId);p.wip+=d.qty;move(p.id,'wip',+d.qty,'DP',d.no,'ผลิตเสร็จ'); }
    else if(t==='PS'){ const p=P(d.productId);p.wip-=d.qty;p.atPlating+=d.qty;move(p.id,'wip',-d.qty,'PS',d.no,'ส่งชุบ '+(d.vendor||''));move(p.id,'atPlating',+d.qty,'PS',d.no,'ส่งชุบ'); }
    else if(t==='PR'){ const p=P(d.productId);p.atPlating-=d.qty;p.wip+=d.qty;move(p.id,'atPlating',-d.qty,'PR',d.no,'รับคืนชุบ');move(p.id,'wip',+d.qty,'PR',d.no,'รับคืนชุบ'); }
    else if(t==='QC'){ const p=P(d.productId);const tot=d.qtyOk+d.qtyNg;p.wip-=tot;p.passedQC+=d.qtyOk;p.ng+=d.qtyNg;move(p.id,'wip',-tot,'QC',d.no,'คัดแยก');if(d.qtyOk)move(p.id,'passedQC',+d.qtyOk,'QC',d.no,'OK');if(d.qtyNg)move(p.id,'ng',+d.qtyNg,'QC',d.no,'NG'); }
    else if(t==='SI'){ const p=P(d.productId);p.passedQC-=d.qty;p.onHand+=d.qty;move(p.id,'passedQC',-d.qty,'SI',d.no,'รับเข้าสต๊อค');move(p.id,'onHand',+d.qty,'SI',d.no,'รับเข้าสต๊อค'); }
    else if(t==='INV'){ d.lines.forEach(l=>{const p=P(l.productId);p.onHand-=l.qty;move(p.id,'onHand',-l.qty,'INV',d.no,'ขาย '+(d.customer||''));}); }
    else if(t==='ADJ'){ const p=P(d.productId);const before=p.onHand;const after=d.mode==='set'?d.qty:before+d.qty;const delta=after-before;p.onHand=after;move(p.id,'onHand',delta,'ADJ',d.no,d.mode==='set'?'ตรวจนับตั้งยอด':'ปรับยอด'); d.delta=delta; }
    // PO & PRD: authorize only, no stock effect
    return {ok:true};
  }catch(e){return {ok:false,err:e.message}}
}
function reverseDoc(d){
  // reverse the movements created by this doc
  const ms=DB.movements.filter(m=>m.docNo===d.no);
  ms.forEach(m=>{const p=P(m.productId);if(p)p[m.bucket]-=m.qty;});
  DB.movements=DB.movements.filter(m=>m.docNo!==d.no);
}

  if(!ms.length)return `<div class="empty"><div class="big">📭</div><div class="t">ยังไม่มีความเคลื่อนไหว</div><div>เริ่มสร้างเอกสารเพื่อบันทึกการเข้า-ออก</div></div>`;
  const bk={onHand:'คงเหลือ',wip:'ผลิตเสร็จ',atPlating:'ระหว่างชุบ',passedQC:'คัดผ่าน',ng:'NG'};
  return `<div class="tbl-wrap"><table><thead><tr><th>วันที่</th><th>Part</th><th>รายการ</th><th>บัญชี</th><th class="num">จำนวน</th><th>เอกสาร</th></tr></thead><tbody>
  ${ms.map(m=>{const p=P(m.productId);return `<tr><td class="muted">${m.date}</td><td>${p?'<span class="pn">'+p.pn+'</span>':'-'}</td><td>${m.note}</td><td><span class="tag gray">${bk[m.bucket]||m.bucket}</span></td><td class="num"><b style="color:${m.qty>=0?'var(--teal)':'var(--red)'}">${m.qty>=0?'+':''}${fmt(m.qty)}</b></td><td class="muted pn">${m.docNo}</td></tr>`}).join('')}
  </tbody></table></div>`;
}

function invSet(t){invFilter.type=t;document.querySelectorAll('#invSeg button').forEach((b,i)=>b.classList.toggle('on',['all','FG','RM'][i]===t));renderInvTable()}
function renderInvTable(){
  const wrap=document.getElementById('invTableWrap');if(!wrap)return;
  const q=invFilter.q.trim().toLowerCase();
  let list=DB.products.filter(p=>invFilter.type==='all'||p.type===invFilter.type);
  if(q)list=list.filter(p=>(p.pn+' '+p.name+' '+p.customer+' '+p.material).toLowerCase().includes(q));
  list=list.slice().sort((a,b)=>a.pn.localeCompare(b.pn));
  if(!list.length){wrap.innerHTML=`<div class="empty"><div class="big">🔍</div><div class="t">ไม่พบรายการ</div></div>`;return}
  wrap.innerHTML=`<div class="tbl-wrap"><table><thead><tr>
    <th>ประเภท</th><th>Part Number</th><th>ชื่อ</th><th>ลูกค้า</th><th class="num">MOQ</th><th class="num">ราคาขาย</th><th>การชุบ</th><th>เงื่อนไขวัตถุดิบ</th>
    <th class="num">คงเหลือ</th><th class="num">WIP</th><th class="num">ชุบ</th><th class="num">รอรับเข้า</th><th></th>
  </tr></thead><tbody>
  ${list.map(p=>{
    const low=p.onHand<=(p.reorder||0)&&(p.reorder>0||p.onHand===0);
    const moq=p.moq||p.reorder||0;
    const plt = p.type==='RM' ? '<span class="muted">—</span>' : (p.needPlating?'<span class="tag cyan">'+esc(p.plating||'ชุบ')+'</span>':'<span class="muted">ไม่ชุบ</span>');
    const matTag = p.material?'<span class="tag gray">'+esc(p.material)+'</span> ':'';
    const cond = p.type==='RM' ? (p.material?'<span class="tag gray">'+esc(p.material)+'</span>':'<span class="muted">—</span>')
      : matTag+(p.custSupplyMat?'<span class="tag violet">ลูกค้าจ่ายแมท</span>':'<span class="tag gray">บริษัทซื้อแมท</span>');
    return `<tr>
      <td>${typeTag(p.type)}</td>
      <td><span class="pn linkish" onclick="openProduct('${p.id}')">${p.pn}</span></td>
      <td>${p.name}</td>
      <td>${p.customer==='ไม่ระบุ'?'<span class="muted">—</span>':p.customer}</td>
      <td class="num ${moq?'':'muted'}">${fmt(moq)}</td>
      <td class="num">${p.salePrice>0?fmt2(p.salePrice):'<span class="muted">—</span>'}</td>
      <td>${plt}</td>
      <td>${cond}</td>
      <td class="num"><b style="color:${low?'var(--red)':'var(--ink)'}">${fmt(p.onHand)}</b></td>
      <td class="num ${p.wip?'':'muted'}">${fmt(p.wip)}</td>
      <td class="num ${p.atPlating?'':'muted'}">${fmt(p.atPlating)}</td>
      <td class="num ${p.passedQC?'':'muted'}">${fmt(p.passedQC)}</td>
      <td style="text-align:right;white-space:nowrap"><button class="btn sm" onclick="openProduct('${p.id}')">รายละเอียด</button></td>
    </tr>`}).join('')}
  </tbody></table></div>
  <div style="padding:12px 16px;color:var(--ink3);font-size:12px;border-top:1px solid var(--line2)">แสดง ${list.length} รายการ</div>`;
}

  const total=p.onHand+p.wip+p.atPlating+p.passedQC;
  const ms=DB.movements.filter(m=>m.productId===id).sort((a,b)=>b.ts-a.ts).slice(0,12);
  const bk={onHand:'คงเหลือ',wip:'ผลิตเสร็จ',atPlating:'ระหว่างชุบ',passedQC:'คัดผ่าน',ng:'NG'};
  const seg=[['คงเหลือพร้อมขาย',p.onHand,'var(--teal)'],['ผลิตเสร็จ/WIP',p.wip,'var(--brand)'],['ระหว่างชุบ',p.atPlating,'var(--cyan)'],['คัดผ่านรอรับเข้า',p.passedQC,'var(--violet)']];
  const sum=Math.max(1,seg.reduce((s,x)=>s+x[1],0));

    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">${typeTag(p.type)}<span class="tag gray">ลูกค้า: ${p.customer}</span>${p.material?'<span class="tag gray">แมท: '+p.material+'</span>':''}${p.needPlating?'<span class="tag cyan">ชุบ: '+(p.plating||'-')+'</span>':''}${p.custSupplyMat?'<span class="tag violet">ลูกค้าจ่ายแมท</span>':''}</div>
    <div class="row c4" style="margin-bottom:6px">
      ${seg.map(s=>`<div class="card" style="box-shadow:none"><div class="lbl">${s[0]}</div><div class="val" style="font-size:22px;color:${s[2]}">${fmt(s[1])}</div></div>`).join('')}
    </div>
    <div class="bktbar">${seg.map(s=>`<div style="width:${s[1]/sum*100}%;background:${s[2]}"></div>`).join('')}</div>
    ${p.ng?`<div style="margin-top:10px"><span class="tag red">NG สะสม: ${fmt(p.ng)}</span></div>`:''}
    <div class="panel" style="margin-top:18px;box-shadow:none"><div class="panel-h"><h2 style="font-size:14px">🔁 ความเคลื่อนไหวล่าสุด</h2></div>
    <div class="panel-b nopad">${ms.length?`<div class="tbl-wrap"><table><thead><tr><th>วันที่</th><th>รายการ</th><th>บัญชี</th><th class="num">จำนวน</th><th>เอกสาร</th></tr></thead><tbody>
      ${ms.map(m=>`<tr><td class="muted">${m.date}</td><td>${m.note}</td><td><span class="tag gray">${bk[m.bucket]||m.bucket}</span></td><td class="num"><b style="color:${m.qty>=0?'var(--teal)':'var(--red)'}">${m.qty>=0?'+':''}${fmt(m.qty)}</b></td><td class="muted pn">${m.docNo}</td></tr>`).join('')}
      </tbody></table></div>`:'<div class="empty" style="padding:24px"><div>ยังไม่มีความเคลื่อนไหว</div></div>'}</div></div>
  `,footer:`<button class="btn" onclick="closeModal();openProductForm('${p.id}')">✏️ แก้ไขข้อมูล</button><button class="btn pri" onclick="closeModal()">ปิด</button>`});

      <div class="field"><label>Part Number <span class="req">*</span></label><input id="f_pn" value="${p?esc(p.pn):''}" placeholder="เช่น 40051848"></div>
    </div>
    <div class="field"><label>ชื่อสินค้า</label><input id="f_name" value="${p?esc(p.name):''}" placeholder="เช่น SHAFT, SEAT, BUSH"></div>
    <div class="row c2">
      <div class="field"><label>ลูกค้า</label><input id="f_cust" list="dl_cust" value="${p?esc(p.customer):''}"><datalist id="dl_cust">${cust.map(c=>`<option value="${esc(c)}">`).join('')}</datalist></div>
      <div class="field"><label>วัตถุดิบ (เกรด)</label><input id="f_mat" value="${p?esc(p.material):''}" placeholder="S45C, SS400, 6R..."></div>
    </div>
    <div class="row c3">
      <div class="field"><label>MOQ / จุดสั่งซ้ำ</label><input type="number" id="f_reorder" value="${p?p.reorder:0}"></div>
      <div class="field"><label>ราคาขาย</label><input type="number" step="0.01" id="f_sale" value="${p?p.salePrice:0}"></div>
      <div class="field"><label>ราคาซื้อ/ต้นทุน</label><input type="number" step="0.01" id="f_buy" value="${p?p.buyPrice:0}"></div>
    </div>
    <div id="fgOnly" style="${p&&p.type==='RM'?'display:none':''}">
      <div class="row c2">
        <div class="field"><label>การชุบ</label><input id="f_plt" list="dl_plt" value="${p?esc(p.plating):''}" placeholder="ว่าง = ไม่ชุบ" oninput="document.getElementById('f_needplt').checked=!!this.value.trim()"><datalist id="dl_plt">${plt.map(c=>`<option value="${esc(c)}">`).join('')}</datalist></div>
        <div class="field"><label>เงื่อนไขวัตถุดิบ</label>
          <label style="font-weight:400;display:flex;gap:7px;align-items:center;margin-top:8px"><input type="checkbox" id="f_csm" style="width:auto" ${p&&p.custSupplyMat?'checked':''}> ลูกค้าจ่ายแมท (Customer Supply)</label>
          <input type="hidden" id="f_needplt" ${p&&p.needPlating?'value=1':''}>
        </div>
      </div>
    </div>
    <div class="field"><label>หมายเหตุ</label><input id="f_remark" value="${p?esc(p.remark):''}"></div>
    ${isEdit?'<div class="hint"><span class="i">ℹ️</span> ยอดคงเหลือปรับผ่านเอกสาร (รับเข้า/เบิก/ปรับยอด) เพื่อให้มีการอนุมัติและบันทึกประวัติ</div>':'<div class="field"><label>ยอดยกมา (สต๊อคตั้งต้น)</label><input type="number" id="f_open" value="0"></div>'}
  `,footer:`<button class="btn" onclick="closeModal()">ยกเลิก</button><button class="btn pri" onclick="saveProduct('${id||''}')">บันทึก</button>`});
  setTimeout(()=>{const ts=document.getElementById('f_type');if(!ts)return;ts.onchange=()=>{const fo=document.getElementById('fgOnly');if(fo)fo.style.display=ts.value==='RM'?'none':''}},10);
}
function saveProduct(id){
  const v=k=>document.getElementById(k);
  const pn=v('f_pn').value.trim();if(!pn){toast('กรุณากรอก Part Number','err');return}
  const type=v('f_type').value;
  let p=id?P(id):null;
  if(!p){p=mkProduct(type,{pn,name:'',cust:''});p.onHand=Number(v('f_open').value)||0;DB.products.push(p);
    if(p.onHand)move(p.id,'onHand',p.onHand,'ADJ','ยอดยกมา','ยอดยกมาตั้งต้น');}
  p.type=type;p.pn=pn;p.name=v('f_name').value.trim()||'-';p.customer=v('f_cust').value.trim()||'ไม่ระบุ';
  p.material=v('f_mat').value.trim();p.reorder=Number(v('f_reorder').value)||0;
  p.salePrice=Number(v('f_sale').value)||0;p.buyPrice=Number(v('f_buy').value)||0;p.remark=v('f_remark').value.trim();
  if(type==='FG'){p.plating=v('f_plt').value.trim();p.needPlating=!!p.plating;p.custSupplyMat=v('f_csm').checked;}
  else{p.plating='';p.needPlating=false;p.custSupplyMat=false;}
  // register customer
  if(p.customer&&!DB.settings.customers.includes(p.customer))DB.settings.customers.push(p.customer);
  closeModal();render();toast(id?'บันทึกการแก้ไขแล้ว':'เพิ่มสินค้าใหม่แล้ว','ok');
}

      <div class="right">${(type==='PRD'||type==='WD'||type==='PO')?`<div class="searchbox"><input id="docSearch" placeholder="ค้นหา เลขที่ / Part / ผู้ขาย" oninput="filterDocRows()"></div>`:''}${type==='PRD'?`<input type="file" id="prdImportFile" accept=".json" style="display:none" onchange="applyPRDImport(this)"><button class="btn" onclick="document.getElementById('prdImportFile').click()">📥 นำเข้า</button>`:''}${type==='WD'?`<input type="file" id="wdImportFile" accept=".json" style="display:none" onchange="applyWDImport(this)"><button class="btn" onclick="document.getElementById('wdImportFile').click()">📥 นำเข้า</button>`:''}${type==='PO'?`<input type="file" id="poImportFile" accept=".json" style="display:none" onchange="applyPurchaseImport(this)"><button class="btn" onclick="document.getElementById('poImportFile').click()">📥 นำเข้า</button>`:''}<button class="btn pri" onclick="openDocForm('${type}')">+ สร้าง${cfg.label}</button></div>
    </div>
    <div class="panel-b nopad">
      ${docs.length?`<div class="tbl-wrap"><table><thead><tr>
        <th>เลขที่</th><th>วันที่</th><th>รายละเอียด</th><th class="num">จำนวน</th><th>สถานะ</th><th></th>
      </tr></thead><tbody id="docRows">
      ${docs.map(d=>docRow(d)).join('')}
      </tbody></table></div>`:`<div class="empty"><div class="big">${cfg.icon}</div><div class="t">ยังไม่มีเอกสาร</div><div>กดปุ่ม "สร้าง${cfg.label}" เพื่อเริ่มต้น</div></div>`}
    </div>

function docHint(type){
  const h={
    PO:'สั่งซื้อวัตถุดิบจาก Supplier → เมื่ออนุมัติแล้วใช้เป็นฐานในการ "รับวัตถุดิบ" เข้าสต๊อค',
    GR:'รับวัตถุดิบจริงเข้าคลัง → เมื่ออนุมัติ ระบบ <b>เพิ่มยอดวัตถุดิบคงเหลืออัตโนมัติ</b>',
    PRD:'ใบสั่งผลิต (Production Order) ส่งให้ผู้ผลิต (MAKER) → เลขที่ PO ใช้ค้นย้อนกลับได้ว่า ผลิตอะไร วันที่ จำนวน ใครผลิต · พิมพ์/PDF/ส่ง LINE ได้',
    WD:'เบิกวัตถุดิบไปผลิต → เมื่ออนุมัติ ระบบ <b>ตัดยอดวัตถุดิบคงเหลืออัตโนมัติ</b>',
    DP:'รายงานจำนวนผลิตเสร็จประจำวัน → เข้าบัญชี WIP (ผลิตเสร็จรอดำเนินการ)',
    QC:'คัดแยกของดี (OK) / ของเสีย (NG) → OK เข้า "คัดผ่านรอรับเข้า", NG บันทึกแยก',
    SI:'รับชิ้นงานที่คัดผ่านเข้าสต๊อคสำเร็จรูป → <b>เพิ่มยอดคงเหลือพร้อมขายอัตโนมัติ</b>',
    INV:'เปิด Invoice ส่งลูกค้า → เมื่ออนุมัติ ระบบ <b>ตัดยอดสต๊อคสำเร็จรูปอัตโนมัติ</b>',
    ADJ:'ปรับยอด/ตรวจนับ → ตั้งยอดตามการนับจริง หรือปรับเพิ่ม-ลด พร้อมประวัติ',
  };
  return h[type]?`<div class="hint"><span class="i">💡</span><div>${h[type]}</div></div>`:'';
}
function docRow(d){
  if(d.type==='PRD')return prdRow(d);
  if(d.type==='WD')return wdRow(d);
  if(d.type==='PO')return purchaseRow(d);
  const cfg=DT[d.type];let detail='',qty='';
  if(cfg.multi){detail=(d.lines||[]).map(l=>{const p=P(l.productId);return p?p.pn:'?'}).slice(0,3).join(', ')+((d.lines||[]).length>3?` +${d.lines.length-3}`:'');qty=fmt((d.lines||[]).reduce((s,l)=>s+l.qty,0));
    if(d.type==='PO'||d.type==='GR')detail=(d.supplier?'Supplier: '+d.supplier+' · ':'')+detail;
    if(d.type==='INV')detail=(d.customer?d.customer+' · ':'')+detail;
  } else {
    const p=P(d.productId);detail=p?`<span class="pn">${p.pn}</span> ${p.name}`:'-';
    if(d.type==='QC')qty=`OK ${fmt(d.qtyOk)} / NG ${fmt(d.qtyNg)}`;
    else if(d.type==='ADJ')qty=(d.mode==='set'?'ตั้งเป็น ':'ปรับ ')+fmt(d.qty);
    else if(d.type==='PRD'){qty=fmt(d.qty);detail+= ` <span class="muted">(ผลิต)</span>`;}
    else qty=fmt(d.qty);
  }
  return `<tr>
    <td class="pn">${d.no}</td><td class="muted">${d.date}</td><td>${detail}${d.note?' <span class="muted">· '+esc(d.note)+'</span>':''}</td>
    <td class="num">${qty}</td><td>${statusTag(d.status)}</td>
    <td style="text-align:right;white-space:nowrap">
      <button class="btn sm" onclick="viewDoc('${d.id}')">ดู</button>
      ${d.status==='pending'?`<button class="btn sm ok" onclick="approveDoc('${d.id}')">อนุมัติ</button>`:''}
      ${d.status==='approved'?`<button class="btn sm danger" onclick="cancelDoc('${d.id}')">ยกเลิก</button>`:''}
    </td></tr>`;
}

function docStageInfo(type){
  const el=document.getElementById('stageInfo');if(!el)return;
  const prod=document.getElementById('d_prod');if(!prod)return;const p=P(prod.value);if(!p){el.innerHTML='';return}
  const rows=[['คงเหลือพร้อมขาย',p.onHand],['ผลิตเสร็จ/WIP',p.wip],['ระหว่างชุบ',p.atPlating],['คัดผ่านรอรับเข้า',p.passedQC]];
  let warn='';
  const qty=Number((document.getElementById('d_qty')||{}).value)||0;
  if(type==='PS'&&qty>p.wip)warn='⚠️ จำนวนเกิน WIP ที่มี';
  if(type==='PR'&&qty>p.atPlating)warn='⚠️ จำนวนเกินที่ส่งชุบ';
  if(type==='SI'&&qty>p.passedQC)warn='⚠️ จำนวนเกินที่คัดผ่าน';
  if(type==='QC'){const ok=Number((document.getElementById('d_ok')||{}).value)||0;const ng=Number((document.getElementById('d_ng')||{}).value)||0;if(ok+ng>p.wip)warn='⚠️ OK+NG เกิน WIP';}
  el.innerHTML=`<div class="panel" style="box-shadow:none;margin:6px 0 0"><div class="panel-b" style="padding:10px 14px">
    ${rows.map(r=>`<div class="kv"><span class="k">${r[0]}</span><b>${fmt(r[1])}</b></div>`).join('')}
    ${p.needPlating&&(type==='DP'||type==='SI')?`<div class="kv"><span class="k">การชุบ</span><span class="tag cyan">${p.plating||'ต้องชุบ'}</span></div>`:''}
    ${warn?`<div style="color:var(--red);font-size:12.5px;margin-top:6px;font-weight:600">${warn}</div>`:''}
  </div></div>`;
}
/* submit */
function submitDoc(type,status){
  const cfg=DT[type];const v=k=>(document.getElementById(k)||{}).value;
  const d={id:uid(),type,no:nextNo(cfg.prefix),date:v('d_date')||todayISO(),ts:Date.now(),status:'pending',note:v('d_note')||''};
  if(cfg.multi){
    const lines=lineState.filter(l=>l.productId&&Number(l.qty)>0).map(l=>({productId:l.productId,qty:Number(l.qty),price:Number(l.price)||0}));
    if(!lines.length){toast('กรุณาเพิ่มรายการอย่างน้อย 1 บรรทัด','err');return}
    d.lines=lines;
    if(type==='PO'||type==='GR')d.supplier=v('d_supplier')||'';
    if(type==='GR')d.refPO=v('d_refpo')||'';
    if(type==='INV'){d.customer=v('d_customer')||'';
      for(const l of lines){const p=P(l.productId);if(l.qty>p.onHand){toast(`${p.pn}: จำนวนขายเกินคงเหลือ (${fmt(p.onHand)})`,'err');return}}}
    if(type==='WD'){d.refPRD=(()=>{const id=v('d_refprd');const x=DB.docs.find(z=>z.id===id);return x?x.no:''})();
      for(const l of lines){const p=P(l.productId);if(l.qty>p.onHand){toast(`${p.pn}: เบิกเกินคงเหลือ (${fmt(p.onHand)})`,'err');return}}}
  } else {
    const pid=v('d_prod');if(!pid){toast('กรุณาเลือกสินค้า','err');return}
    d.productId=pid;
    if(type==='QC'){d.qtyOk=Number(v('d_ok'))||0;d.qtyNg=Number(v('d_ng'))||0;if(d.qtyOk+d.qtyNg<=0){toast('กรุณากรอกจำนวน','err');return}}
    else if(type==='ADJ'){d.mode=v('d_mode');d.qty=Number(v('d_qty'))||0;}
    else if(type==='PRD'){d.qty=Number(v('d_qty'))||0;d.due=v('d_due')||'';if(d.qty<=0){toast('กรุณากรอกจำนวนผลิต','err');return}
      d.lines=lineState.filter(l=>l.productId&&Number(l.qty)>0).map(l=>({productId:l.productId,qty:Number(l.qty)}));}
    else {d.qty=Number(v('d_qty'))||0;if(d.qty<=0){toast('กรุณากรอกจำนวน','err');return}}
    if(type==='PS')d.vendor=v('d_vendor')||'';
    // validation against buckets
    const p=P(pid);const err=validateStage(type,d,p);if(err){toast(err,'err');return}
  }
  DB.docs.push(d);
  if(status==='approved'){const r=doApprove(d);if(!r.ok){toast('อนุมัติไม่สำเร็จ: '+r.err,'err');}else toast('สร้างและอนุมัติแล้ว: '+d.no,'ok');}
  else toast('บันทึกเอกสาร '+d.no+' (รออนุมัติ)','ok');
  closeModal();render();
}
function validateStage(type,d,p){
  if(type==='PS'&&d.qty>p.wip)return `WIP ไม่พอ (มี ${fmt(p.wip)})`;
  if(type==='PR'&&d.qty>p.atPlating)return `จำนวนเกินที่ส่งชุบ (มี ${fmt(p.atPlating)})`;
  if(type==='QC'&&(d.qtyOk+d.qtyNg)>p.wip)return `OK+NG เกิน WIP (มี ${fmt(p.wip)})`;
  if(type==='SI'&&d.qty>p.passedQC)return `เกินที่คัดผ่าน (มี ${fmt(p.passedQC)})`;
  return '';
}

function applyPRDImport(input){
  const f=input.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{
    let data;try{data=JSON.parse(e.target.result)}catch(err){toast('ไฟล์ไม่ถูกต้อง','err');input.value='';return}

    if(!orders.length){toast('ไม่พบรายการในไฟล์','err');input.value='';return}
    ensureSettings();let added=0,skipped=0,matched=0;
    orders.forEach(o=>{

      if(DB.docs.find(x=>x.type==='PRD'&&x.no===no)){skipped++;return;}
      const pn=(o.pn||'').trim();const p=DB.products.find(x=>x.type==='FG'&&x.pn===pn);if(p)matched++;
      const qty=Number(o.qty)||0,price=Number(o.price)||0;const maker=(o.maker||'').trim();
      DB.docs.push({id:uid(),type:'PRD',ts:Date.now(),status:'approved',imported:true,approvedAt:'(นำเข้า)',

        lines:[{fgId:p?p.id:'',name:p?(p.pn+(p.name&&p.name!=='-'?' '+p.name:'')):(pn+(o.name?' '+o.name:'')),qty,price,due:o.due||''}],
        wht3:false,subtotal:qty*price,wht:0,net:qty*price,note:o.customer?('ลูกค้า: '+o.customer):''});
      commitPONo(no);
      if(maker&&!makerByCode(maker))DB.settings.makers.push({code:maker,name:'',taxId:'',address:'',tel:''});
      added++;
    });
    saveDB();render();
    modal({title:'📥 ผลการนำเข้าใบสั่งผลิต',body:`
      <div class="kv"><span class="k">นำเข้าใหม่</span><b style="color:var(--teal)">${fmt(added)} ใบ</b></div>

    `,footer:`<button class="btn pri" onclick="closeModal()">ตกลง</button>`});
    input.value='';
  };
  r.readAsText(f);

function prdPick(i,val){prdLines[i].name=val;const pn=(val||'').split(' ')[0];const p=DB.products.find(x=>x.type==='FG'&&x.pn===pn);prdLines[i].fgId=p?p.id:'';if(p&&!prdLines[i].price&&p.salePrice){prdLines[i].price=p.salePrice;const inp=document.querySelectorAll('#prdRoot tbody tr')[i];if(inp){const pe=inp.querySelectorAll('input')[2];if(pe)pe.value=p.salePrice;}}prdTotals();}
function prdTotals(){

function submitPRD(status,editId){
  const v=k=>(document.getElementById(k)||{}).value;
  const no=(v('po_no')||'').trim();if(!no){toast('กรุณากรอกเลขที่ PO','err');return}
  const maker=(v('po_maker')||'').trim();if(!maker){toast('กรุณาระบุ MAKER','err');return}
  const lines=prdLines.filter(l=>(l.name||l.fgId)&&Number(l.qty)>0).map(l=>({fgId:l.fgId||'',name:(l.name||'').trim(),qty:Number(l.qty),price:Number(l.price)||0,due:l.due||''}));
  if(!lines.length){toast('กรุณาเพิ่มรายการอย่างน้อย 1 บรรทัด','err');return}
  if(!editId){const dup=DB.docs.find(x=>x.type==='PRD'&&x.no===no);if(dup){toast('เลขที่ PO '+no+' มีอยู่แล้ว','err');return}}
  const sub=lines.reduce((s,l)=>s+l.qty*l.price,0);
  const wht3=!!(document.getElementById('po_wht')&&document.getElementById('po_wht').checked);
  const wht=wht3?sub*0.03:0;
  let d;
  if(editId){d=DB.docs.find(x=>x.id===editId);if(!d)return;}
  else{d={id:uid(),type:'PRD',ts:Date.now(),status:'pending'};DB.docs.push(d);}
  d.no=no;d.date=v('po_date')||todayISO();d.maker=maker;d.makerInfo=makerByCode(maker)||{code:maker};
  d.producer=(v('po_producer')||'').trim();d.lines=lines;d.wht3=wht3;d.subtotal=sub;d.wht=wht;d.net=sub-wht;d.note=(v('po_note')||'').trim();
  commitPONo(no);
  if(!makerByCode(maker))DB.settings.makers.push({code:maker,name:'',taxId:'',address:'',tel:''});
  if(status==='approved'){d.status='approved';d.approvedAt=new Date().toLocaleString('th-TH');}
  closeModal();render();toast((editId?'บันทึกการแก้ไข ':'สร้างใบสั่งผลิต ')+d.no,'ok');
}

/* ============================================================
   ใบสั่งซื้อวัตถุดิบ (Purchase Order) — ฟอร์มมาตรฐาน + พิมพ์/PDF/LINE
   ============================================================ */
let poLines=[];
function peekPU(){const y=String(new Date().getFullYear()+543).slice(2);return y+String((DB.counters['PU']||0)+1).padStart(3,'0');}
function commitPU(no){const m=/^(\d{2})(\d+)$/.exec((no||'').trim());if(m){const cy=String(new Date().getFullYear()+543).slice(2);if(m[1]===cy){const n=parseInt(m[2],10);if(n>(DB.counters['PU']||0))DB.counters['PU']=n;}}}
function applyPurchaseImport(input){
  const f=input.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{
    let data;try{data=JSON.parse(e.target.result)}catch(err){toast('ไฟล์ไม่ถูกต้อง','err');input.value='';return}
    const orders=Array.isArray(data)?data:(data.orders||[]);
    if(!orders.length){toast('ไม่พบรายการในไฟล์','err');input.value='';return}
    ensureSettings();let added=0,skipped=0,lc=0;
    orders.forEach(o=>{const no=(o.no||'').trim();if(!no)return;if(DB.docs.find(x=>x.type==='PO'&&x.no===no)){skipped++;return;}
      const lines=(o.lines||[]).map(l=>{const nm=(l.name||'').trim();const p=DB.products.find(x=>x.type==='RM'&&(x.pn===nm.split(' ')[0]||x.pn===nm));return {productId:p?p.id:'',name:nm,qty:Number(l.qty)||0,unit:l.unit||'',price:Number(l.price)||0}}).filter(l=>l.name||l.qty);
      if(!lines.length)return;lc+=lines.length;
      const sub=lines.reduce((s,l)=>s+l.qty*l.price,0);const sup=(o.supplier||'').trim();
      DB.docs.push({id:uid(),type:'PO',ts:Date.now(),status:'approved',imported:true,approvedAt:'(นำเข้า)',no,date:o.date||todayISO(),deliveryDate:o.deliveryDate||'',supplier:sup,creditTerms:o.creditTerms||'',supplierInfo:{},lines,vat7:false,subtotal:sub,vat:0,total:sub,note:''});
      commitPU(no);if(sup&&!DB.settings.suppliers.includes(sup))DB.settings.suppliers.push(sup);added++;});
    saveDB();render();
    modal({title:'📥 ผลการนำเข้าใบสั่งซื้อ',body:`<div class="kv"><span class="k">นำเข้าใหม่</span><b style="color:var(--teal)">${fmt(added)} ใบ</b></div><div class="kv"><span class="k">รวมรายการ</span><b>${fmt(lc)} บรรทัด</b></div><div class="kv"><span class="k">ข้าม (เลขซ้ำ)</span><b>${fmt(skipped)} ใบ</b></div><div class="hint" style="margin-top:10px"><span class="i">ℹ️</span><div>เป็นข้อมูลย้อนหลัง (อนุมัติแล้ว) ค้น/ดู/พิมพ์ PDF/ส่ง LINE ได้ · ใช้อ้างอิงตอนรับวัตถุดิบได้</div></div>`,footer:`<button class="btn pri" onclick="closeModal()">ตกลง</button>`});
    input.value='';
  };
  r.readAsText(f);
}

  `,footer:`<button class="btn" onclick="closeModal()">ยกเลิก</button><button class="btn" onclick="submitPurchase('pending','${edit?edit.id:''}')">บันทึก (รออนุมัติ)</button><button class="btn pri" onclick="submitPurchase('approved','${edit?edit.id:''}')">บันทึก + อนุมัติ</button>`});
  poLines=edit&&edit.lines?edit.lines.map(l=>({productId:l.productId||'',name:l.name||'',qty:l.qty||'',unit:l.unit||'Pcs.',price:l.price||''})):[{productId:'',name:'',qty:'',unit:'Pcs.',price:''}];

function submitPurchase(status,editId){
  const v=k=>(document.getElementById(k)||{}).value;
  const sup=(v('pu_sup')||'').trim();if(!sup){toast('กรุณาระบุผู้ขาย','err');return}
  const no=(v('pu_no')||'').trim();if(!no){toast('กรุณากรอกเลขที่','err');return}
  const lines=poLines.filter(l=>(l.name||l.productId)&&Number(l.qty)>0).map(l=>({productId:l.productId||'',name:(l.name||'').trim(),qty:Number(l.qty),unit:l.unit||'',price:Number(l.price)||0}));
  if(!lines.length){toast('กรุณาเพิ่มรายการอย่างน้อย 1 บรรทัด','err');return}
  if(!editId){const dup=DB.docs.find(x=>x.type==='PO'&&x.no===no);if(dup){toast('เลขที่ '+no+' มีอยู่แล้ว','err');return}}
  const sub=lines.reduce((s,l)=>s+l.qty*l.price,0);const disc=Number(v('pu_disc'))||0;const amount=sub-disc;const vat7=!!(document.getElementById('pu_vat')&&document.getElementById('pu_vat').checked);const vat=vat7?amount*0.07:0;const grand=amount+vat;
  let d;

  d.no=no;d.date=v('pu_date')||todayISO();d.deliveryDate=v('pu_due')||'';d.supplier=sup;d.creditTerms=(v('pu_credit')||'').trim();
  d.supplierInfo={address:(v('pu_addr')||'').trim(),taxId:(v('pu_tax')||'').trim(),contact:(v('pu_contact')||'').trim(),tel:(v('pu_tel')||'').trim()};
  d.lines=lines;d.vat7=vat7;d.subtotal=sub;d.discount=disc;d.amount=amount;d.vat=vat;d.grandTotal=grand;d.total=grand;d.note=(v('pu_note')||'').trim();
  commitPU(no);
  if(!DB.settings.suppliers.includes(sup))DB.settings.suppliers.push(sup);
  if(status==='approved'){d.status='approved';d.approvedAt=new Date().toLocaleString('th-TH');}
  closeModal();render();toast((editId?'บันทึกการแก้ไข ':'สร้างใบสั่งซื้อ ')+d.no,'ok');
}

async function poShareImage(html,d){
  const frame=document.createElement('iframe');
  frame.setAttribute('aria-hidden','true');
  frame.style.cssText='position:fixed;left:0;top:0;width:980px;height:1500px;border:0;opacity:0.01;pointer-events:none;z-index:-1';
  document.body.appendChild(frame);
  const fd=frame.contentDocument||frame.contentWindow.document;
  fd.open();fd.write(html);fd.close();
  toast('กำลังสร้างรูปใบสั่งซื้อ...','ok');
  await new Promise(r=>setTimeout(r,500));
  try{
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
    const body=fd.body;
    const canvas=await window.html2canvas(body,{scale:2,backgroundColor:'#ffffff',width:body.scrollWidth,height:body.scrollHeight,windowWidth:980});
    const blob=await new Promise(res=>canvas.toBlob(res,'image/png'));
    if(frame.parentNode)document.body.removeChild(frame);
    const fname='PO-'+(d.no||'')+'.png';
    const file=new File([blob],fname,{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file],title:'ใบสั่งซื้อ '+d.no,text:'ใบสั่งซื้อวัตถุดิบ '+d.no}); return; }catch(err){ if(err&&err.name==='AbortError')return; }
    }
    const url=URL.createObjectURL(blob);
    const w=window.open('','_blank');
    if(w){w.document.write('<title>'+fname+'</title><body style="margin:0;background:#444;text-align:center"><img src="'+url+'" style="max-width:100%;height:auto;display:block;margin:0 auto"></body>');w.document.close();}
    const a=document.createElement('a');a.href=url;a.download=fname;a.click();
    toast('บันทึกรูปใบสั่งซื้อแล้ว — เปิด LINE แล้วแนบรูปส่งได้','ok');
  }catch(err){ if(frame.parentNode)document.body.removeChild(frame); toast('สร้างรูปไม่สำเร็จ: '+err.message,'err'); }
}
function purchaseRow(d){
  const items=(d.lines||[]).map(l=>l.name||(l.productId&&P(l.productId)?P(l.productId).pn:'')).slice(0,1).join(', ')+((d.lines||[]).length>1?` +${d.lines.length-1}`:'');
  return `<tr><td class="pn linkish" onclick="viewDoc('${d.id}')">${d.no}</td><td class="muted">${d.date}</td><td><span class="tag cyan">${esc(d.supplier||'-')}</span> <span class="muted">${esc(items)}</span></td><td class="num">${fmt2(d.total||d.subtotal||0)}</td><td>${statusTag(d.status)}</td><td style="text-align:right;white-space:nowrap"><button class="btn sm" onclick="viewDoc('${d.id}')">ดู</button> <button class="btn sm" onclick="printPurchase('${d.id}')">🖨️</button>${d.status==='pending'?` <button class="btn sm ok" onclick="approveDoc('${d.id}')">อนุมัติ</button>`:''}</td></tr>`;
}

let wdLines=[];
function applyWDImport(input){
  const f=input.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{
    let data;try{data=JSON.parse(e.target.result)}catch(err){toast('ไฟล์ไม่ถูกต้อง','err');input.value='';return}
    const docs=Array.isArray(data)?data:(data.docs||[]);
    if(!docs.length){toast('ไม่พบรายการในไฟล์','err');input.value='';return}
    ensureSettings();let added=0,skipped=0,lc=0;
    docs.forEach(o=>{
      const no=(o.no||'').trim();
      if(no&&DB.docs.find(x=>x.type==='WD'&&x.no===no)){skipped++;return;}
      const lns=(o.lines||[]).map(l=>{const mn=(l.matName||'').trim();const p=DB.products.find(x=>x.type==='RM'&&(x.pn===mn.split(' ')[0]||x.pn===mn));return {productId:p?p.id:'',matName:mn,price:Number(l.price)||0,qty:Number(l.qty)||0,unit:l.unit||'Kgs.',poNo:(l.poNo||'').trim(),fgPn:(l.fgPn||'').trim(),maker:(l.maker||'').trim(),date:l.date||'',ordered:Number(l.ordered)||0}}).filter(l=>l.matName||l.qty);
      if(!lns.length)return;lc+=lns.length;
      DB.docs.push({id:uid(),type:'WD',ts:Date.now(),status:'approved',imported:true,approvedAt:'(นำเข้า)',
        no:no||nextNo('WD'),date:o.date||lns[0].date||todayISO(),supplier:(o.supplier||'').trim(),note:o.note||'',
        lines:lns,subtotal:lns.reduce((s,l)=>s+l.price*l.qty,0),totalQty:lns.reduce((s,l)=>s+l.qty,0)});
      added++;
    });
    saveDB();render();
    modal({title:'📥 ผลการนำเข้าใบเบิกวัตถุดิบ',body:`
      <div class="kv"><span class="k">นำเข้าใหม่</span><b style="color:var(--teal)">${fmt(added)} ใบ</b></div>
      <div class="kv"><span class="k">รวมรายการเบิก</span><b>${fmt(lc)} บรรทัด</b></div>
      <div class="kv"><span class="k">ข้าม (เลขซ้ำ)</span><b>${fmt(skipped)} ใบ</b></div>
      <div class="hint" style="margin-top:10px"><span class="i">ℹ️</span><div>เป็นข้อมูลย้อนหลัง (อนุมัติแล้ว) <b>ไม่ตัดยอดซ้ำ</b> เพราะยอดคงเหลือปัจจุบันรวมการเบิกเหล่านี้แล้ว · ค้น/ดู/พิมพ์ PDF/ส่ง LINE ได้</div></div>
    `,footer:`<button class="btn pri" onclick="closeModal()">ตกลง</button>`});
    input.value='';
  };
  r.readAsText(f);
}

function doApprove(d){

function approveDoc(id){const d=DB.docs.find(x=>x.id===id);if(!d||d.status!=='pending')return;

function approveAll(){const pend=DB.docs.filter(d=>d.status==='pending');let ok=0,fail=0;
  pend.forEach(d=>{if(!DT[d.type].multi&&d.productId){if(validateStage(d.type,d,P(d.productId))){fail++;return}}
    if((d.type==='INV'||d.type==='WD')){let bad=false;d.lines.forEach(l=>{if(l.qty>P(l.productId).onHand)bad=true});if(bad){fail++;return}}
    const r=doApprove(d);r.ok?ok++:fail++;});
  render();toast(`อนุมัติ ${ok} รายการ${fail?` · ข้าม ${fail} (ยอดไม่พอ)`:''}`,fail?'err':'ok')}

/* ============================================================

   ============================================================ */
function exportData(){downloadFile(JSON.stringify(DB,null,2),'RTK_backup_'+todayISO()+'.json','application/json');toast('สำรองข้อมูลเป็นไฟล์แล้ว','ok')}
function importData(input){const f=input.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{try{const j=JSON.parse(e.target.result);if(!j.products)throw 0;DB=j;saveDB();go('dashboard');toast('นำเข้าข้อมูลสำเร็จ','ok')}catch(err){toast('ไฟล์ไม่ถูกต้อง','err')}input.value=''};
  r.readAsText(f);}
function downloadFile(content,name,mime){const b=new Blob([content],{type:mime});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}
/* อัปเดตเฉพาะยอดคงเหลือ (onHand) จับคู่ตาม Part Number — ไม่แตะเอกสาร/ใบสั่งผลิต/ประวัติ */
function applyBalanceUpdate(input){
  const f=input.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{
    let data;try{data=JSON.parse(e.target.result)}catch(err){toast('ไฟล์ไม่ถูกต้อง','err');input.value='';return}
    const bals=Array.isArray(data)?data:(data.balances||[]);
    if(!bals.length){toast('ไม่พบข้อมูลยอดในไฟล์','err');input.value='';return}
    const byPn={};DB.products.forEach(p=>{(byPn[p.pn]=byPn[p.pn]||[]).push(p)});
    const used=new Set();let updated=0,unchanged=0,notfound=0;const nf=[];const docNo='UPD-'+(data.date||todayISO());
    bals.forEach(b=>{
      const pn=(b.pn||'').trim();const cand=byPn[pn];

      const p=cand.find(x=>!used.has(x.id)&&(x.name||'')===(b.name||''))||cand.find(x=>!used.has(x.id))||cand[0];

      if(delta!==0){p.onHand=nv;move(p.id,'onHand',delta,'IMPORT',docNo,'อัปเดตยอดคงเหลือจากไฟล์');updated++;}
      else unchanged++;
    });

      <div class="kv"><span class="k">ไม่พบ Part Number ในระบบ</span><b style="color:${notfound?'var(--red)':'var(--ink)'}">${fmt(notfound)} รายการ</b></div>
      ${nf.length?`<div class="hint" style="margin-top:10px"><span class="i">⚠️</span><div>ไม่พบ: ${nf.map(esc).join(', ')}${notfound>nf.length?' ...':''}</div></div>`:''}

    `,footer:`<button class="btn pri" onclick="closeModal()">ตกลง</button>`});
    input.value='';
  };
  r.readAsText(f);
}

function addPlanLine(){planLines.push({fgId:'',name:'',qty:'',due:'',price:'',m1:'',m2:'',m3:'',m4:''});renderPlanLines(window.__planType)}
const DATE_RE=/^\d{1,4}[-\/.]\d{1,2}[-\/.]\d{1,4}$/;
function findPN(tokens){
  for(const tk of tokens){if(DB.products.find(x=>x.type==='FG'&&x.pn===tk))return tk;}
  for(const tk of tokens){const c=tk.replace(/,/g,'');if(/\d/.test(tk)&&!/^\d{1,5}$/.test(c)&&!DATE_RE.test(tk)&&/^[A-Za-z0-9][A-Za-z0-9\-\/.]{3,}$/.test(tk))return tk;}
  return tokens[0]||'';
}
function parsePastePlan(type){
  const raw=(document.getElementById('pl_paste')||{}).value||'';
  if(!raw.trim()){toast('ยังไม่มีข้อมูลที่วาง','err');return}
  fillPlanFromText(type,raw);
}
function fillPlanFromText(type,raw){
  const rows=raw.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);const out=[];
  rows.forEach(line=>{
    const tokens=line.split(/[\s\t,;]+/).filter(Boolean);if(!tokens.length)return;
    const pn=findPN(tokens);if(!pn)return;
    const p=DB.products.find(x=>x.type==='FG'&&x.pn===pn);
    const isCode=p||(/\d/.test(pn)&&pn.length>=5&&!/^\d{1,5}$/.test(pn.replace(/,/g,''))&&!DATE_RE.test(pn));
    if(!isCode)return; // ข้ามบรรทัดหัวตาราง/วันที่/ข้อความอื่น
    const nums=[]; line.replace(pn,' ').replace(/(\d)\s+,/g,'$1,').replace(/,(?=\d{3}(?:\D|$))/g,'').split(/[\s\t,;]+/).forEach(t=>{if(/^-?\d+(\.\d+)?$/.test(t))nums.push(Math.round(parseFloat(t)));else if(t==='-'||t==='–')nums.push(0);});
    const name=p?(p.pn+(p.name&&p.name!=='-'?' '+p.name:'')):pn;
    if(type==='FC'){const v=nums.slice(-4);while(v.length<4)v.unshift(0);out.push({fgId:p?p.id:'',name,m1:v[0],m2:v[1],m3:v[2],m4:v[3]});}
    else {const q=nums.length?nums[nums.length-1]:0;if(q>0)out.push({fgId:p?p.id:'',name,qty:q,due:'',price:0});}
  });
  if(!out.length){toast('แปลงไม่ได้ — ไม่พบรายการ Part Number','err');return false;}
  planLines=out;renderPlanLines(type);
  const matched=out.filter(o=>o.fgId).length;
  toast('อ่าน '+out.length+' รายการ (จับคู่ PN ได้ '+matched+')','ok');return true;
}
function loadScript(src){return new Promise((res,rej)=>{if(document.querySelector('script[data-src="'+src+'"]')){res();return}const s=document.createElement('script');s.src=src;s.setAttribute('data-src',src);s.onload=()=>res();s.onerror=()=>rej(new Error('โหลดไลบรารีไม่ได้ (ตรวจอินเทอร์เน็ต)'));document.head.appendChild(s);});}
async function handleFileExtract(input,type){
  const f=input.files[0];if(!f)return;input.value='';
  const st=document.getElementById('pl_fileStatus');const set=m=>{if(st)st.textContent=m};
  try{
    let text='';
    if(f.type==='application/pdf'||/\.pdf$/i.test(f.name)){
      set('⏳ กำลังอ่าน PDF...');
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
      window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const buf=await f.arrayBuffer();const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;const lines=[];
      for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const tc=await page.getTextContent();const rmap={};
        tc.items.forEach(it=>{const y=Math.round(it.transform[5]);(rmap[y]=rmap[y]||[]).push({x:it.transform[4],s:it.str})});
        Object.keys(rmap).map(Number).sort((a,b)=>b-a).forEach(y=>{lines.push(rmap[y].sort((a,b)=>a.x-b.x).map(o=>o.s).join(' '))});
      }
      text=lines.join('\n');
    } else if(/\.(xlsx|xls|csv)$/i.test(f.name)||/spreadsheet|excel|csv/.test(f.type)){
      set('⏳ กำลังอ่าน Excel...');
      await loadScript('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js');
      const buf=await f.arrayBuffer();const wb=window.XLSX.read(buf,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=window.XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:''});
      text=rows.map(r=>r.map(c=>(c===null||c===undefined)?'':String(c)).join('\t')).join('\n');
    } else if(/^image\//.test(f.type)||/\.(png|jpe?g|gif|bmp|webp)$/i.test(f.name)){
      set('⏳ กำลัง OCR รูปภาพ... (โหลดครั้งแรกอาจนาน)');
      await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
      const r=await window.Tesseract.recognize(f,'eng',{logger:m=>{if(m.status==='recognizing text')set('OCR '+Math.round(m.progress*100)+'%')}});
      text=r.data.text;
    } else { toast('รองรับ PDF / Excel / รูปภาพ เท่านั้น','err');set('');return; }
    const okk=fillPlanFromText(type,text);
    set(okk?'✅ อ่านเสร็จ — ตรวจทาน/แก้ไขในตารางด้านล่างได้':'⚠️ อ่านไฟล์ได้แต่ไม่พบ Part Number');
  }catch(e){ set('❌ '+e.message); toast('อ่านไฟล์ไม่สำเร็จ: '+e.message,'err'); }
}

function submitPlan(type,editId){
  const v=k=>(document.getElementById(k)||{}).value;
  const cust=(v('pl_cust')||'').trim();if(!cust){toast('กรุณาเลือกลูกค้า','err');return}

  if(type==='FC')lines=planLines.filter(l=>(l.name||l.fgId)&&(Number(l.m1)||Number(l.m2)||Number(l.m3)||Number(l.m4))).map(l=>({fgId:l.fgId||'',name:(l.name||'').trim(),m1:Number(l.m1)||0,m2:Number(l.m2)||0,m3:Number(l.m3)||0,m4:Number(l.m4)||0}));
  else lines=planLines.filter(l=>(l.name||l.fgId)&&Number(l.qty)>0).map(l=>({fgId:l.fgId||'',name:(l.name||'').trim(),qty:Number(l.qty),due:l.due||'',price:Number(l.price)||0}));
  if(!lines.length){toast('กรุณาเพิ่มรายการ','err');return}
  let d;
  if(editId){d=DB.docs.find(x=>x.id===editId);if(!d)return;}
  else{d={id:uid(),type,ts:Date.now(),status:'active'};DB.docs.push(d);DB.counters['PLAN_'+type]=(DB.counters['PLAN_'+type]||0)+1;}

  if(type==='PL')d.shipDate=v('pl_ship')||todayISO();
  if(!DB.settings.customers.includes(cust))DB.settings.customers.push(cust);
  closeModal();render();toast('บันทึก'+PLAN[type].label+' '+d.no,'ok');
}
function viewPlan(id){

  modal({title:PLAN[d.type].icon+' '+d.no,size:'lg',body:`
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap"><span class="tag violet">${PLAN[d.type].label}</span><span class="tag gray">ลูกค้า: ${esc(d.customer||'-')}</span>${d.custPo?'<span class="tag gray">PO ลูกค้า: '+esc(d.custPo)+'</span>':''}${d.shipDate?'<span class="tag gray">ส่ง: '+d.shipDate+'</span>':''}</div>
    ${rows}`,
    footer:`<button class="btn" onclick="closeModal();openPlanForm('${d.type}',DB.docs.find(x=>x.id==='${d.id}'))">✏️ แก้ไข</button><button class="btn danger" onclick="delPlan('${d.id}')">ลบ</button><button class="btn pri" onclick="printPlanDoc('${d.id}')">🖨️ พิมพ์ / PDF</button>`});
}
function delPlan(id){confirmBox('ลบเอกสารนี้?','',()=>{DB.docs=DB.docs.filter(x=>x.id!==id);closeModal();render();toast('ลบแล้ว','ok')})}

    body=(d.lines||[]).map((l,i)=>{const pn=l.fgId&&P(l.fgId)?P(l.fgId).pn+' '+P(l.fgId).name:(l.name||'');return '<tr><td style="text-align:center">'+(i+1)+'</td><td>'+esc(pn)+'</td><td class="r">'+fmt(l.m1)+'</td><td class="r">'+fmt(l.m2)+'</td><td class="r">'+fmt(l.m3)+'</td><td class="r">'+fmt(l.m4)+'</td><td class="r">'+fmt((l.m1||0)+(l.m2||0)+(l.m3||0)+(l.m4||0))+'</td></tr>'}).join('');
  } else {thead='<th>#</th><th>Part Number</th><th>จำนวน</th>'+(d.type==='CPO'?'<th>กำหนดส่ง</th>':'');

   +".title{text-align:right}.title .t1{font-size:19px;font-weight:700}"
   +".meta{margin-top:10px;font-size:12.5px}.meta b{color:#555}"
   +"table{width:100%;border-collapse:collapse;margin-top:12px;font-size:12px}th,td{border:1px solid #888;padding:6px 8px}th{background:#eee;text-align:center}td.r{text-align:right}"
   +".sign{display:flex;justify-content:space-between;margin-top:46px;text-align:center;font-size:12px}.sign div{width:30%}.sign .line{border-top:1px dotted #555;margin-top:30px;padding-top:4px}"
   +"@media print{.noprint{display:none}}</style></head><body>"
   +'<div class="hd"><div class="co"><h1>'+esc(co.name||'')+'</h1><div>'+esc(co.address||'')+'</div><div>TAX ID: '+esc(co.taxId||'')+' &nbsp; โทร '+esc(co.tel||'')+'</div></div>'
   +'<div class="title"><div class="t1">'+titleTh+'</div><div style="margin-top:6px;font-size:13px"><b>เลขที่:</b> '+esc(d.no)+'</div></div></div>'
   +'<div class="meta"><b>ลูกค้า:</b> '+esc(d.customer||'')+(d.custPo?' &nbsp; <b>PO ลูกค้า:</b> '+esc(d.custPo):'')+(d.shipDate?' &nbsp; <b>วันที่ส่ง:</b> '+d.shipDate:'')+'</div>'
   +'<table><thead><tr>'+thead+'</tr></thead><tbody>'+body+'</tbody></table>'
   +'<div class="sign"><div><div class="line">ผู้จัดทำ</div></div><div><div class="line">ผู้ตรวจสอบ</div></div><div><div class="line">ผู้อนุมัติ</div></div></div>'

/* MRP — เช็คความเพียงพอ */
function mrpRows(){
  const agg={};
  const keyOf=l=>l.fgId||('pn:'+((l.name||'').split(' ')[0]));
  const ens=(k,l)=>{if(!agg[k])agg[k]={fgId:l.fgId||'',pn:(l.name||'').split(' ')[0]||'',fc:0,po:0,pl:0};return agg[k]};
  DB.docs.filter(d=>d.type==='FC').forEach(d=>d.lines.forEach(l=>{const a=ens(keyOf(l),l);a.fc+=(l.m1||0)+(l.m2||0)+(l.m3||0)+(l.m4||0)}));
  DB.docs.filter(d=>d.type==='CPO').forEach(d=>d.lines.forEach(l=>{const a=ens(keyOf(l),l);a.po+=l.qty||0}));
  DB.docs.filter(d=>d.type==='PL').forEach(d=>d.lines.forEach(l=>{const a=ens(keyOf(l),l);a.pl+=l.qty||0}));
  const onOrder={};DB.docs.filter(d=>d.type==='PRD'&&(d.status==='approved'||d.status==='pending')&&!d.imported).forEach(d=>(d.lines||[]).forEach(l=>{const k=l.fgId||('pn:'+((l.name||'').split(' ')[0]));onOrder[k]=(onOrder[k]||0)+(l.qty||0)}));
  return Object.keys(agg).map(k=>{const a=agg[k];const p=a.fgId?P(a.fgId):DB.products.find(x=>x.type==='FG'&&x.pn===a.pn);
    const avail=p?(p.onHand+p.wip+p.atPlating+p.passedQC):0;const oo=onOrder[k]||(p&&onOrder[p.id])||0;
    const demand=a.fc+a.po+a.pl;const supply=avail+oo;const bal=supply-demand;
    return {pn:a.pn||(p?p.pn:'?'),name:p?p.name:'',cust:p?p.customer:'',fc:a.fc,po:a.po,pl:a.pl,demand,avail,oo,bal,short:Math.max(0,-bal),pid:p?p.id:''};
  }).sort((x,y)=>x.bal-y.bal);
}
function viewMRP(el){
  setTitle('✅ เช็คความเพียงพอ','เทียบความต้องการ (Forecast+PO+แผนส่ง) กับของที่มี + แนะนำการดำเนินการ');
  let rows=mrpRows();const shortN=rows.filter(r=>r.bal<0).length;const okN=rows.length-shortN;
  const totDemand=rows.reduce((s,r)=>s+r.demand,0),totShort=rows.reduce((s,r)=>s+r.short,0);
  if(mrpOnlyShort)rows=rows.filter(r=>r.bal<0);
  el.innerHTML=`
  <div class="cards">
    <div class="card"><div class="lbl"><span class="dot d-brand">📦</span>รายการที่มีความต้องการ</div><div class="val">${fmt(mrpRows().length)}</div></div>
    <div class="card"><div class="lbl"><span class="dot d-red">🚨</span>ของขาด (ต้องผลิต/ซื้อ)</div><div class="val">${fmt(shortN)}</div><div class="sub">ขาดรวม ${fmt(totShort)} ชิ้น</div></div>
    <div class="card"><div class="lbl"><span class="dot d-teal">✅</span>เพียงพอ</div><div class="val">${fmt(okN)}</div></div>
    <div class="card"><div class="lbl"><span class="dot d-violet">📈</span>ความต้องการรวม</div><div class="val">${fmt(totDemand)}</div></div>
  </div>
  <div class="panel"><div class="panel-h"><h2>ตารางความเพียงพอ (MRP)</h2>
    <div class="right"><div class="searchbox"><input id="mrpSearch" placeholder="ค้นหา PN / ชื่อ / ลูกค้า" oninput="filterMrpRows()"></div><div class="seg"><button class="${!mrpOnlyShort?'on':''}" onclick="mrpOnlyShort=false;render()">ทั้งหมด</button><button class="${mrpOnlyShort?'on':''}" onclick="mrpOnlyShort=true;render()">เฉพาะที่ขาด</button></div></div>
  </div><div class="panel-b nopad">
    ${rows.length?`<div class="tbl-wrap"><table><thead><tr>
      <th>Part Number</th><th>ลูกค้า</th><th class="num">Forecast</th><th class="num">PO</th><th class="num">แผนส่ง</th><th class="num">รวมต้องการ</th><th class="num">ของที่มี</th><th class="num">กำลังผลิต</th><th class="num">คงเหลือสุทธิ</th><th>สถานะ</th><th>ดำเนินการ</th>
    </tr></thead><tbody id="mrpRows">
    ${rows.map(r=>`<tr>
      <td><span class="pn ${r.pid?'linkish':''}" ${r.pid?`onclick="openProduct('${r.pid}')"`:''}>${esc(r.pn)}</span><br><span class="muted" style="font-size:11px">${esc(r.name||'')}</span></td>
      <td>${esc(r.cust||'-')}</td>
      <td class="num ${r.fc?'':'muted'}">${fmt(r.fc)}</td><td class="num ${r.po?'':'muted'}">${fmt(r.po)}</td><td class="num ${r.pl?'':'muted'}">${fmt(r.pl)}</td>
      <td class="num"><b>${fmt(r.demand)}</b></td>
      <td class="num">${fmt(r.avail)}</td><td class="num ${r.oo?'':'muted'}">${fmt(r.oo)}</td>
      <td class="num"><b style="color:${r.bal<0?'var(--red)':'var(--teal)'}">${r.bal>=0?'+':''}${fmt(r.bal)}</b></td>
      <td>${r.bal<0?`<span class="tag red">ขาด ${fmt(r.short)}</span>`:(r.avail<r.demand?`<span class="tag amber">รอผลิต</span>`:`<span class="tag green">เพียงพอ</span>`)}</td>
      <td style="white-space:nowrap">${r.bal<0&&r.pid?`<button class="btn sm pri" onclick="mrpMakePO('${r.pid}',${r.short})">เปิดใบสั่งผลิต</button>`:(r.avail<r.demand&&r.oo>0?'<span class="muted">รอผลิตที่สั่งไว้</span>':'<span class="muted">—</span>')}</td>
    </tr>`).join('')}
    </tbody></table></div>`:`<div class="empty"><div class="big">📭</div><div class="t">${mrpOnlyShort?'ไม่มีรายการที่ขาด — ของพอทั้งหมด ✅':'ยังไม่มีข้อมูลความต้องการ'}</div><div>${mrpOnlyShort?'':'ไปบันทึก Forecast / Customer PO / แผนจัดส่งก่อน'}</div></div>`}
  </div></div>`;
}
function mrpMakePO(pid,qty){const p=P(pid);if(!p)return;openPRDForm(null,[{fgId:pid,name:p.pn+(p.name&&p.name!=='-'?' '+p.name:''),qty:qty}]);}
/* ============================================================
   UI primitives: modal, toast, confirm
   ============================================================ */
function modal({title,body,footer,size}){
  document.getElementById('modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal ${size==='lg'?'lg':''}"><div class="modal-h"><h3>${title}</h3><span class="x" onclick="closeModal()">×</span></div>
    <div class="modal-b">${body}</div>${footer?`<div class="modal-f">${footer}</div>`:''}</div></div>`;
}
function closeModal(){document.getElementById('modalRoot').innerHTML=''}
function confirmBox(title,msg,onYes){
  window.__yes=onYes;
  document.getElementById('modalRoot').innerHTML=`<div class="overlay"><div class="modal" style="max-width:440px"><div class="modal-h"><h3>${title}</h3></div>
  <div class="modal-b"><p style="color:var(--ink2)">${msg}</p></div>
  <div class="modal-f"><button class="btn" onclick="closeModal()">ยกเลิก</button><button class="btn danger" onclick="(window.__yes&&window.__yes())">ยืนยัน</button></div></div></div>`;
}
let toastN=0;
function toast(msg,type){const id='t'+(++toastN);const w=document.getElementById('toasts');
  const e=document.createElement('div');e.className='toast '+(type||'');e.id=id;e.innerHTML=`<span>${type==='ok'?'✓':type==='err'?'⚠':'ℹ'}</span><span>${msg}</span>`;
  w.appendChild(e);setTimeout(()=>{e.style.opacity='0';e.style.transform='translateX(20px)';e.style.transition='.3s';setTimeout(()=>e.remove(),300)},3000)}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

/* ---------- gate (passcode) ---------- */
function gatePassed(){
  const code=DB.settings&&DB.settings.passcode;
  if(!code)return true;
  return localStorage.getItem('rtk_pass')===code;
}
function renderGate(){
  document.getElementById('content').innerHTML='';
  document.getElementById('modalRoot').innerHTML=`<div class="overlay"><div class="modal" style="max-width:380px"><div class="modal-h"><h3>🔒 เข้าสู่ระบบ RTK Store</h3></div><div class="modal-b"><div class="field"><label>กรอกรหัสผ่านเข้าใช้งาน</label><input type="password" id="gateInput" onkeydown="if(event.key==='Enter')tryGate()"></div><div id="gateErr" style="color:var(--red);font-size:12.5px;display:none">รหัสไม่ถูกต้อง</div></div><div class="modal-f"><button class="btn pri" onclick="tryGate()">เข้าใช้งาน</button></div></div></div>`;
  setTimeout(()=>{const i=document.getElementById('gateInput');if(i)i.focus()},60);
}
function tryGate(){
  const v=(document.getElementById('gateInput')||{}).value||'';
  if(v===(DB.settings&&DB.settings.passcode)){ localStorage.setItem('rtk_pass',v); closeModal(); render(); subscribeRealtime(); setSyncStatus(cloudOK?'synced':'offline'); }
  else { const e=document.getElementById('gateErr'); if(e)e.style.display='block'; }
}
/* ---------- boot ---------- */
(async function(){
  try{ if(window.supabase&&SUPA_URL&&SUPA_KEY){ supa=window.supabase.createClient(SUPA_URL,SUPA_KEY); } }catch(e){ supa=null; }
  await loadDB();
  if(!gatePassed()){ renderNav(); renderGate(); return; }
  render();
  subscribeRealtime();
  setSyncStatus(cloudOK?'synced':'offline');
})();
</script>
